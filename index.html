<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
/* ========================================
   全局变量 & 重置
   ======================================== */
:root {
  --bg: #fdf6f0;
  --text: #5a3e36;
  --accent: #c17f6b;
  --accent2: #d4a08a;
  --gold: #c9a96e;
  --card-bg: #ffffff;
  --shadow: 0 4px 20px rgba(0,0,0,0.06);
  --radius: 16px;
  --font-title: "STSong", "SimSun", "Songti SC", "Noto Serif SC", serif;
  --font-body: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --timeline-line: #e0c8b8;
  --tag-bg: #fdf0ea;
}

/* 卡通风格变量 */
body.cartoon {
  --bg: #fff9e6;
  --text: #5a4636;
  --accent: #f9a826;
  --accent2: #ffcc80;
  --gold: #f9a826;
  --card-bg: #ffffff;
  --shadow: 0 4px 20px rgba(249,168,38,0.12);
  --radius: 20px;
  --font-title: "STSong", "SimSun", serif;
  --font-body: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  --timeline-line: #ffe0b2;
  --tag-bg: #fff3e0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  min-height: 100vh;
  transition: background 0.5s, color 0.5s;
}

/* ========================================
   风格切换按钮
   ======================================== */
.style-toggle {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 999;
  display: flex;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  border-radius: 30px;
  padding: 4px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  border: 1px solid rgba(0,0,0,0.06);
}
.style-toggle button {
  border: none;
  background: transparent;
  padding: 10px 18px;
  border-radius: 26px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: var(--font-body);
  color: #999;
  white-space: nowrap;
}
.style-toggle button.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(193,127,107,0.3);
}
body.cartoon .style-toggle button.active {
  background: var(--accent);
  box-shadow: 0 2px 8px rgba(249,168,38,0.3);
}

/* ========================================
   主容器
   ======================================== */
.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 0 0 60px;
}

/* ========================================
   海报区
   ======================================== */
.poster-section {
  position: relative;
  width: 100%;
  overflow: hidden;
}
.poster-section img {
  width: 100%;
  display: block;
}
.poster-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: linear-gradient(transparent, var(--bg));
  pointer-events: none;
}

/* ========================================
   视频区
   ======================================== */
.video-section {
  padding: 20px 16px 10px;
  text-align: center;
}
.video-section .section-title {
  font-family: var(--font-title);
  font-size: 22px;
  color: var(--accent);
  margin-bottom: 16px;
  letter-spacing: 2px;
}
.video-wrapper {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  background: #000;
}
.video-wrapper video {
  width: 100%;
  display: block;
  max-height: 60vh;
  object-fit: contain;
}

/* ========================================
   时间轴
   ======================================== */
.timeline-section {
  padding: 30px 16px;
}
.timeline-section .section-title {
  text-align: center;
  font-family: var(--font-title);
  font-size: 24px;
  color: var(--accent);
  margin-bottom: 32px;
  letter-spacing: 3px;
}
.timeline-section .section-title::after {
  content: '';
  display: block;
  width: 40px;
  height: 2px;
  background: var(--accent2);
  margin: 10px auto 0;
  border-radius: 1px;
}

/* 时间轴节点 */
.timeline-node {
  position: relative;
  padding-left: 36px;
  padding-bottom: 32px;
  border-left: 2px solid var(--timeline-line);
}
.timeline-node:last-child {
  border-left-color: transparent;
  padding-bottom: 0;
}
.timeline-dot {
  position: absolute;
  left: -7px;
  top: 4px;
  width: 12px;
  height: 12px;
  background: var(--accent);
  border-radius: 50%;
  border: 2px solid #fff;
  box-shadow: 0 0 0 2px var(--accent2);
}
.timeline-date {
  font-size: 13px;
  color: var(--accent2);
  font-weight: 600;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.timeline-stage-title {
  font-family: var(--font-title);
  font-size: 20px;
  color: var(--text);
  margin-bottom: 14px;
  letter-spacing: 1px;
}

/* 照片网格 */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.photo-grid.single { grid-template-columns: 1fr; }
.photo-grid.single img { max-height: 360px; object-fit: cover; }

.photo-grid img {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  border-radius: 10px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.3s;
}
.photo-grid img:hover {
  transform: scale(1.02);
}
.photo-grid img:active {
  transform: scale(1.05);
}

/* 描述文字 */
.stage-desc {
  font-size: 14px;
  color: #8c7b74;
  line-height: 1.8;
  margin-top: 10px;
  padding: 12px 16px;
  background: var(--tag-bg);
  border-radius: 10px;
  border-left: 3px solid var(--accent2);
}

/* ========================================
   文稿滚动组件（求婚赋）
   ======================================== */
.essay-component {
  margin-top: 14px;
  background: linear-gradient(135deg, #fef9f5, #fdf3ec);
  border-radius: var(--radius);
  border: 1px solid var(--timeline-line);
  overflow: hidden;
}
.essay-header {
  padding: 14px 18px 10px;
  border-bottom: 1px solid var(--timeline-line);
  display: flex;
  align-items: center;
  gap: 10px;
}
.essay-header .essay-icon {
  font-size: 20px;
}
.essay-header .essay-label {
  font-family: var(--font-title);
  font-size: 16px;
  color: var(--accent);
  letter-spacing: 1px;
}
.essay-body {
  padding: 20px 18px;
  max-height: 260px;
  overflow-y: auto;
  font-family: var(--font-title);
  font-size: 15px;
  line-height: 2.2;
  color: #6b5147;
  letter-spacing: 0.5px;
}
.essay-body::-webkit-scrollbar {
  width: 4px;
}
.essay-body::-webkit-scrollbar-thumb {
  background: var(--accent2);
  border-radius: 2px;
}
.essay-body p {
  text-indent: 2em;
  margin-bottom: 12px;
}
.essay-body .essay-signature {
  text-align: right;
  text-indent: 0;
  margin-top: 16px;
  color: var(--accent);
  font-weight: bold;
}
.essay-body .essay-date {
  text-align: right;
  text-indent: 0;
  color: #aa948b;
  font-size: 13px;
}

/* ========================================
   图片预览灯箱
   ======================================== */
.lightbox {
  display: none;
  position: fixed;
  z-index: 9999;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92);
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.lightbox.show { display: flex; }
.lightbox img {
  max-width: 92vw;
  max-height: 75vh;
  object-fit: contain;
  border-radius: 8px;
}
.lightbox-close {
  position: absolute;
  top: 20px;
  right: 24px;
  color: #fff;
  font-size: 36px;
  cursor: pointer;
  z-index: 1;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.1);
  border-radius: 50%;
}
.lightbox-counter {
  color: rgba(255,255,255,0.7);
  margin-top: 16px;
  font-size: 13px;
}
.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  color: #fff;
  font-size: 48px;
  cursor: pointer;
  padding: 20px;
  user-select: none;
  opacity: 0.6;
  transition: opacity 0.2s;
}
.lightbox-nav:hover { opacity: 1; }
.lightbox-nav.prev { left: 8px; }
.lightbox-nav.next { right: 8px; }

/* ========================================
   卡通风格区域
   ======================================== */
.cartoon-section {
  display: none;
  padding: 24px 16px 60px;
}
body.cartoon .cartoon-section { display: block; }
body.cartoon .realistic-section { display: none; }

.cartoon-section .section-title {
  text-align: center;
  font-family: var(--font-title);
  font-size: 24px;
  color: var(--accent);
  margin-bottom: 8px;
  letter-spacing: 2px;
}
.cartoon-section .section-subtitle {
  text-align: center;
  font-size: 13px;
  color: #bfa088;
  margin-bottom: 24px;
}
.cartoon-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
.cartoon-grid img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  background: #ffe8c8;
  transition: transform 0.3s;
}
.cartoon-grid img:active {
  transform: scale(1.04);
}
.cartoon-grid .cartoon-full {
  grid-column: 1 / -1;
  aspect-ratio: auto;
}

/* ========================================
   底部
   ======================================== */
.footer {
  text-align: center;
  padding: 30px 16px;
  font-size: 12px;
  color: #c8b8b0;
  letter-spacing: 1px;
}
.footer .heart {
  color: var(--accent);
  animation: heartbeat 1.2s infinite;
}
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  15% { transform: scale(1.25); }
  30% { transform: scale(1); }
}

/* ========================================
   入场动画
   ======================================== */
.fade-in {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}
.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ========================================
   响应式
   ======================================== */
@media (max-width: 380px) {
  .photo-grid { gap: 6px; }
  .timeline-node { padding-left: 28px; }
  .essay-body { max-height: 200px; font-size: 14px; }
}
</style>
</head>

// ========================================
// 🔧 渲染引擎
// ========================================

// ---- 渲染时间轴 ----
function renderTimeline() {
  const container = document.getElementById('timelineContainer');
  let html = '';

  CONFIG.timeline.forEach((stage, idx) => {
    const photoCount = stage.photos.length;
    const gridClass = photoCount === 1 ? 'photo-grid single' : 'photo-grid';

    // 照片
    let photosHtml = '';
    stage.photos.forEach((photo, pi) => {
      photosHtml += `<img src="${photo}" alt="${stage.title}" loading="lazy"
                         onclick="openLightbox('${stage.id}', ${pi})" onerror="this.style.display='none'">`;
    });

    // 文稿组件
    let essayHtml = '';
    if (stage.essay) {
      const e = stage.essay;
      let essayContent = '';
      e.content.forEach(para => {
        essayContent += `<p>${para}</p>`;
      });
      essayHtml = `
        <div class="essay-component">
          <div class="essay-header">
            <span class="essay-icon">📜</span>
            <span class="essay-label">${e.title}</span>
          </div>
          <div class="essay-body">
            ${essayContent}
            <p class="essay-signature">—— ${e.signature}</p>
            <p class="essay-date">${e.date}</p>
          </div>
        </div>`;
    }

    html += `
      <div class="timeline-node fade-in">
        <div class="timeline-dot"></div>
        <div class="timeline-date">${stage.date}</div>
        <div class="timeline-stage-title">${stage.title}</div>
        <div class="${gridClass}">
          ${photosHtml}
        </div>
        <div class="stage-desc">${stage.desc}</div>
        ${essayHtml}
      </div>`;
  });

  container.innerHTML = html;
}

// ---- 渲染卡通图集 ----
function renderCartoon() {
  const grid = document.getElementById('cartoonGrid');
  let html = '';
  CONFIG.cartoonImages.forEach((img, i) => {
    const isFull = i === 0 ? ' cartoon-full' : '';
    html += `<img src="${img}" alt="蛋黄猫和噗噗猫" loading="lazy"
                  class="fade-in${isFull}" onerror="this.style.display='none'">`;
  });
  grid.innerHTML = html;
}

// ========================================
// 🎨 风格切换
// ========================================
function switchStyle(style) {
  const btnReal = document.getElementById('btnReal');
  const btnCartoon = document.getElementById('btnCartoon');

  if (style === 'real') {
    document.body.classList.remove('cartoon');
    btnReal.classList.add('active');
    btnCartoon.classList.remove('active');
    localStorage.setItem('weddingStyle', 'real');
  } else {
    document.body.classList.add('cartoon');
    btnCartoon.classList.add('active');
    btnReal.classList.remove('active');
    localStorage.setItem('weddingStyle', 'cartoon');
  }

  // 触发滚动动画重新检测
  setTimeout(checkFadeIn, 100);
}

// ========================================
// 🖼️ 灯箱
// ========================================
let lightboxGroup = null;
let lightboxIdx = 0;

function openLightbox(groupId, idx) {
  const stage = CONFIG.timeline.find(s => s.id === groupId);
  if (!stage) return;
  lightboxGroup = stage.photos;
  lightboxIdx = idx;
  showLightboxImage();
  document.getElementById('lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function showLightboxImage() {
  document.getElementById('lightboxImg').src = lightboxGroup[lightboxIdx];
  document.getElementById('lightboxCounter').textContent =
    `${lightboxIdx + 1} / ${lightboxGroup.length}`;
}

function closeLightbox(e) {
  if (e && e.target !== document.getElementById('lightbox') &&
      e.target.tagName !== 'IMG') return;
  document.getElementById('lightbox').classList.remove('show');
  document.body.style.overflow = '';
  lightboxGroup = null;
}

function navLightbox(dir, e) {
  if (e) e.stopPropagation();
  if (!lightboxGroup) return;
  lightboxIdx = (lightboxIdx + dir + lightboxGroup.length) % lightboxGroup.length;
  showLightboxImage();
}

// 键盘导航
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('show')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1, e);
  if (e.key === 'ArrowRight') navLightbox(1, e);
});

// ========================================
// 📜 滚动入场动画
// ========================================
function checkFadeIn() {
  const els = document.querySelectorAll('.fade-in');
  els.forEach(el => {
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight - 60) {
      el.classList.add('visible');
    }
  });
}

// ========================================
// 🚀 启动
// ========================================
function init() {
  renderTimeline();
  renderCartoon();

  // 恢复上次风格
  const saved = localStorage.getItem('weddingStyle');
  if (saved === 'cartoon') {
    switchStyle('cartoon');
  }

  // 滚动动画
  window.addEventListener('scroll', checkFadeIn, { passive: true });
  setTimeout(checkFadeIn, 300);

  // 视频自动暂停（当滚动离开时）
  const video = document.getElementById('weddingVideo');
  if (video) {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting && !video.paused) {
          video.pause();
        }
      });
    }, { threshold: 0.3 });
    observer.observe(video);
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>
